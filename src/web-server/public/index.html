<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>claude-search</title>
  <script>
    // Hydrate theme before paint to avoid FOUC.
    (function () {
      try {
        var t = localStorage.getItem('claude-search.theme') || 'system';
        document.documentElement.dataset.theme = t;
      } catch (e) {
        document.documentElement.dataset.theme = 'system';
      }
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
  <link rel="preload" href="/fonts/Pretendard-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/MonaspaceNeonVar.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
  <header class="page-header">
    <div class="brand">
      <h1>claude-search</h1>
      <p class="tagline">Local search across your Claude Code sessions. Nothing leaves this machine.</p>
    </div>
    <div class="theme-toggle" role="radiogroup" aria-label="Color theme">
      <button type="button" class="theme-opt" data-theme-value="system" role="radio" aria-checked="false" title="Follow system">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="9" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M6 14h4M8 11.5V14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>System</span>
      </button>
      <button type="button" class="theme-opt" data-theme-value="light" role="radio" aria-checked="false" title="Light">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><circle cx="8" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8h1.5M13 8h1.5M3.3 3.3l1.1 1.1M11.6 11.6l1.1 1.1M3.3 12.7l1.1-1.1M11.6 4.4l1.1-1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Light</span>
      </button>
      <button type="button" class="theme-opt" data-theme-value="dark" role="radio" aria-checked="false" title="Dark">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M13.5 9.5A5.5 5.5 0 1 1 6.5 2.5a4.5 4.5 0 0 0 7 7z" fill="currentColor"/></svg>
        <span>Dark</span>
      </button>
    </div>
  </header>

  <form id="search-form" autocomplete="off">
    <div class="field field-q">
      <svg class="field-icon" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><circle cx="7" cy="7" r="4.5" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="m10.5 10.5 3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input id="q" type="search" name="q" placeholder="Search your transcripts…" autofocus spellcheck="false">
    </div>
    <div class="field field-project">
      <svg class="field-icon" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M1.8 4.5a1 1 0 0 1 1-1h3l1.4 1.5h5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H2.8a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
      <input id="project" type="search" name="project" placeholder="Filter by project (optional)" spellcheck="false">
    </div>
    <button type="submit" class="btn-search">Search</button>
  </form>

  <div id="status" class="status" role="status" aria-live="polite"></div>
  <ol id="results"></ol>

  <div id="empty" class="empty" hidden>
    <p>Start typing above to search your past Claude Code sessions.</p>
    <p class="hint">Try a keyword like <code>error handling</code>, <code>refactor</code>, or a project name.</p>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <template id="result-template">
    <li class="card">
      <div class="card-meta">
        <div class="meta-left">
          <svg class="meta-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path d="M1.8 4.5a1 1 0 0 1 1-1h3l1.4 1.5h5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H2.8a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
          <span class="project" data-field="project"></span>
          <span class="sep" aria-hidden="true">›</span>
          <span class="time" data-field="time"></span>
          <span class="sep" aria-hidden="true">·</span>
          <span class="count" data-field="counts"></span>
        </div>
        <div class="actions">
          <button type="button" class="act act-resume" data-action="resume" title="Open a new terminal and run claude --resume">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path d="M4.5 3.5v9l8-4.5z" fill="currentColor"/></svg>
            <span>Resume</span>
          </button>
          <button type="button" class="act act-open" data-action="open" title="Open project folder in file manager">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path d="M1.8 4.5a1 1 0 0 1 1-1h3l1.4 1.5h5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H2.8a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
            <span>Open</span>
          </button>
          <button type="button" class="act act-copy" data-action="copy" title="Copy resume command">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><rect x="4.5" y="4.5" width="9" height="9" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M3 11V3a.5.5 0 0 1 .5-.5H11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span>Copy</span>
          </button>
        </div>
      </div>
      <h3 class="title" data-field="title"></h3>
      <p class="snippet" data-field="snippet"></p>
    </li>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
